name: macro_momentum_framework
display_name: 宏观驱动动量框架
description: 综合宏观范式判断、多资产配置、技术指标（趋势/动量/资金流/波动率）与严格风控的系统性投资策略。适用于股票、加密货币、黄金、债券等跨资产交易。

# 策略分类：framework（框架）
category: framework

# 关联的核心交易理念编号（1-7），根据文档提炼
core_rules:
  - 1   # 宏观优先：监测全球流动性、DXY、美债收益率、利差、VIX、PMI等
  - 2   # 资产配置矩阵：根据衰退/宽松/通胀/滞胀/危机范式调整仓位
  - 3   # 多时间框架分析：周线定趋势、日线定交易、4h/1h定入场
  - 4   # 技术指标组合：双均线（金叉/死叉）、道氏理论（HH/HL）、RSI（背离）、MACD、CMF、ATR、OBV
  - 5   # 纪律性执行：凯利公式或1-2%单笔风险控制，严格止损（技术/时间止损）
  - 6   # 预期差寻找：分析市场共识与自身差异
  - 7   # 定期复盘：每日/每周/每月复盘，迭代认知

required_tools:
  - get_daily_history      # 获取日线数据，用于计算均线、RSI、MACD、ATR、布林带、OBV
  - analyze_trend          # 分析趋势状态（道氏理论高/低点、双均线排列）
  - get_realtime_quote     # 获取实时报价，用于入场/止损/止盈确认
  - get_sector_rankings    # 获取板块/行业相对强度，辅助资产配置
  - search_stock_news      # 搜索经济数据（CPI、PMI、非农）、央行讲话、地缘事件

aliases:
  - 宏观动量战法
  - 多资产配置框架

default_active: true
default_router: false
default_priority: 80
market_regimes:
  - trending_up
  - volatile
  - ranging

instructions: |
  **宏观驱动的多资产动量框架**

  本策略将投资决策分为五个层次：宏观范式判断 → 资产配置 → 技术信号筛选 → 执行与风控 → 复盘迭代。

  ## 一、宏观范式判断（决策层）

  使用 `search_stock_news` 获取以下关键指标，并判断当前市场处于哪种宏观范式。

  ### 1.1 必看指标与阈值
  - **美元指数 (DXY)**：>105 为强势（风险警示），<100 为弱势（利好风险资产）
  - **美国10年期国债收益率**：快速上行压制成长股，见顶回落利好成长股
  - **10Y-2Y美债利差**：倒挂（负值）为衰退预警；由负转正（陡峭化）常发生在衰退初期
  - **中国PMI**：>50 且超预期 → 利好A股/人民币资产；<50 且不及预期 → 期待政策刺激
  - **VIX**：<20（自满），>25（恐慌），>40（极度恐慌，常对应短期底部）
  - **美国隔夜逆回购**：规模巨大 = 流动性过剩；骤降 = 流动性拐点

  ### 1.2 宏观范式资产配置矩阵
  根据以上指标组合，判定当前范式并采用对应的目标仓位（以 % 表示）：

  | 范式         | 条件组合（示例）                                  | 配置方案                                                               |
  |--------------|------------------------------------------------|------------------------------------------------------------------------|
  | 衰退预期     | 10Y-2Y倒挂、消费者信心走弱、DXY>105、VIX抬升>25 | 40% 长期国债(TLT) + 30% 黄金 + 20% 防御股(必需消费/公用事业) + 10% 现金 |
  | 宽松成长     | DXY<100、降息预期、10Y收益率见顶、中国PMI>50、VIX<20 | 50% 美股成长股/QQQ + 20% 加密货币 + 15% 黄金 + 15% 现金               |
  | 通胀上行     | CPI/PPI超预期、10Y收益率快速上行、加息预期       | 40% 大宗商品/资源股 + 30% 价值股(金融/能源) + 20% 黄金 + 10% 现金      |
  | 滞胀风险     | PMI<50 且 CPI>5%、利差倒挂、消费者信心低迷       | 30% 黄金 + 30% 大宗商品 + 20% 现金 + 20% 抗通胀债券/防御股            |
  | 危机/恐慌    | VIX>40、市场连续暴跌、所有资产齐跌               | >50% 现金 + 30% 黄金 + 20% 分批抄底优质资产                           |

  **执行**：根据当前判定的范式，调整组合的实际持仓比例。若范式发生切换，需在1-3个交易日内完成调仓。

  ## 二、技术信号筛选（执行层）

  在确定资产配置方向后，对具体标的（如TSLA、QQQ、黄金ETF、BTC等）使用技术指标筛选入场时机。要求多时间框架共振。

  ### 2.1 趋势指标
  - **双移动平均线**：使用 `analyze_trend` 判断金叉（MA50上穿MA200）或死叉。价格应在主要均线之上才考虑做多。
  - **道氏理论**：上升趋势要求出现一系列更高的高点(HH)和更高的低点(HL)。跌破前一个HL是趋势逆转的关键止损信号。

  ### 2.2 动量指标
  - **RSI**：>70 为超买，不宜追高；<30 为超卖，不宜杀跌。顶背离（价格新高、RSI未新高）是减仓信号。
  - **MACD**：金叉（DIF上穿DEA）且红柱放大为多头信号；死叉为空头信号；零轴上方为多头市场。

  ### 2.3 资金流指标
  - **CMF (Chaikin Money Flow)**：正值表示聪明钱流入，负值表示流出。与价格走势配合使用。

  ### 2.4 波动率指标
  - **ATR**：用于设置止损（如2倍ATR下方）和初步止盈目标。
  - **布林带**：价格触及上下轨时注意波动扩张或收缩。
  - **OBV (能量潮)**：价格与OBV背离时预示趋势可能反转。

  ### 2.5 多时间框架共振
  - **周线**：确定主趋势方向（是否在MA50/200之上？）
  - **日线**：寻找与周线同向的交易信号（如回调至关键支撑、金叉等）
  - **4小时/1小时**：用于精确入场（如突破小级别下降趋势线或放量阳线）
  - **共振原则**：只做多时间框架方向一致的交易。

  ## 三、执行与风控

  ### 3.1 仓位计算
  - **凯利公式简化版**：仓位比例 = 预期胜率 - (预期败率 / 盈亏比)
  - **简易法**：单笔交易亏损不超过总资金的 1%~2%。根据止损幅度倒推买入数量。
  - **分批建仓**（尤其适用于抄底场景）：
    - 第一笔（20%）：VIX>40 或价格到达第一支撑（如0.382回撤）
    - 第二笔（30%）：价格再创新低但企稳，或V型反转确认
    - 第三笔（50%）：右侧确认（放量突破短期下降趋势线）

  ### 3.2 止损规则
  - **技术止损**：跌破近期关键支撑（如前一个HL）、跌破主要均线（如MA20）、ATR止损（2倍ATR）。
  - **时间止损**：入场后5-10个交易日价格未按预期运动，无条件离场。
  - **宏观止损**：当宏观范式发生不利切换（如DXY突然突破105、VIX持续高于25），降低整体风险敞口。

  ### 3.3 止盈参考
  - 目标1：前高阻力位
  - 目标2：杯柄形态测量目标（详见 `high_volatility_growth_trend` 策略）
  - 移动止盈：跟随MA20或MA50，收盘跌破则减仓。

  ## 四、复盘与迭代

  ### 每日复盘
  - 检查宏观数据发布与事件
  - 检查持仓是否触及止损/止盈
  - 记录各资产的趋势状态（金叉/死叉、道氏结构）

  ### 每周复盘
  - 评估胜率与盈亏来源
  - 根据宏观范式变化调整资产配置矩阵比例
  - 是否需要增加对冲（如黄金、反向ETF）

  ### 每月复盘
  - 收益归因分析
  - 修正模型参数（如斐波那契回撤级别是否需调整）
  - 学习新策略/阅读央行报告，迭代认知

  ## 五、预期差与基本面分析（可选）

  对于个股（如国轩高科），可采用 **5+2 分析法**：
  1. 行业与公司（生命周期、竞争格局）
  2. 商业模式（营收结构、依赖因子）
  3. 管理层评估
  4. 财务健康（特定指标：零售看周转、银行看坏账、SaaS看ARR、TSLA看交付）
  5. 估值（DCF、相对估值）
  6. 投资逻辑（高确定性/防御性/爆发潜力/股息/管理优秀/财务健康/估值低）
  7. 风险分析（竞争、增长、估值、财报披露风险、分析师观点）

  **增加**：寻找“预期差”。分析市场共识是什么？我的观点与共识的差异在哪？为什么我是对的？巨大的预期差是超额收益的来源。

  ## 六、策略综合评分指引 (用于 AI 输出 sentiment_score)

  | 分数范围 | 描述 | 条件 |
  |---------|------|------|
  | 90-100 | 极强多头 | 宏观范式为“宽松成长”，VIX<20，多时间框架共振向上，价格在主要均线之上，RSI处于50-70健康区，MACD零轴上金叉，CMF为正。 |
  | 70-85 | 标准多头 | 宏观中性偏多（DXY走弱但未破100），日线上升趋势，价格回踩支撑未破，动量指标偏多。 |
  | 50-65 | 观望/震荡 | 宏观范式不明，价格处于窄幅盘整，无明确方向，或成交量萎缩。 |
  | <50 | 空头/离场 | 宏观范式转为“衰退预期”或“危机”，VIX>25，价格跌破MA200，MACD死叉，CMF为负。 |

  **输出要求**：在 `buy_reason` 字段中必须说明当前宏观范式、技术信号共振情况以及使用的风控措施。示例：`“宏观处于宽松成长范式，DXY<100，VIX 18。日线上升趋势，价格回踩MA20支撑且MACD金叉，计划在支撑位分批买入，止损设在2倍ATR下方，目标前高。”`